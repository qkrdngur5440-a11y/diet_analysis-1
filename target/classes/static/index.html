<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet & Exercise Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; background: #f4f6f8; color: #333; }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1, h2 { color: #1c4f89; margin-bottom: 12px; }
    .card { background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08); margin-bottom: 24px; }
    .section-note { color: #57606a; margin-bottom: 16px; }
    .exercise-row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 14px; }
    .exercise-row label { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 400px; background: #f8fafb; border: 1px solid #dfe4ea; border-radius: 14px; padding: 12px 14px; }
    .exercise-row input[type="number"] { width: 88px; padding: 8px 10px; border: 1px solid #cbd3db; border-radius: 10px; }
    .button-primary { background: #1c4f89; color: #fff; border: none; padding: 14px 22px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: background 0.2s ease; }
    .button-primary:hover { background: #163d6d; }
    .summary-list { margin-top: 16px; }
    .summary-item { padding: 14px 16px; border-radius: 14px; background: #f0f5fb; margin-bottom: 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-top: 18px; }
    .calendar-card { border-radius: 18px; background: #f8fafb; padding: 18px; min-height: 160px; }
    .calendar-card h3 { margin: 0 0 8px; font-size: 1rem; }
    .calendar-bar { height: 16px; border-radius: 10px; margin: 8px 0 4px; }
    .legend { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #555; }
    .dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
    .green { background: #3fb77e; }
    .red { background: #e24f4f; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; font-weight: 600; }
    .badge-total { background: #1c4f89; color: #fff; }
    .hint { color: #68707d; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="page">
    <h1>오늘의 운동과 칼로리 관리</h1>
    <p class="section-note">체크박스를 통해 오늘 수행한 운동을 선택하고, 운동 시간을 입력해보세요. 오늘 운동과 소모 칼로리가 아래에 나타납니다.</p>

    <div class="card">
      <h2>운동 선택</h2>
      <p class="section-note">운동을 선택한 뒤 저장하면 오늘 운동 기록과 소모 칼로리가 업데이트됩니다.</p>
      <div id="exerciseOptions"></div>
      <button id="saveExercises" class="button-primary">운동 기록 저장</button>
    </div>

    <div class="card">
      <h2>오늘 한 운동</h2>
      <div id="todayExerciseSummary"><p class="hint">운동을 저장하면 여기에 오늘 운동 목록과 소모 칼로리가 표시됩니다.</p></div>
    </div>

    <div class="card">
      <h2>섭취 · 소모 칼로리 달력</h2>
      <div class="legend">
        <span class="legend-item"><span class="dot green"></span>섭취 칼로리</span>
        <span class="legend-item"><span class="dot red"></span>소모 칼로리</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
  </div>

  <script>
    const exerciseChoices = [
      { name: '걷기', rate: 6, defaultDuration: 30 },
      { name: '달리기', rate: 10, defaultDuration: 20 },
      { name: '자전거', rate: 8, defaultDuration: 30 },
      { name: '줄넘기', rate: 12, defaultDuration: 15 },
      { name: '요가', rate: 4, defaultDuration: 40 }
    ];

    const today = new Date().toISOString().slice(0, 10);

    function renderExerciseOptions() {
      const container = document.getElementById('exerciseOptions');
      container.innerHTML = '';

      exerciseChoices.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'exercise-row';
        row.innerHTML = `
          <label>
            <input type="checkbox" data-index="${index}" />
            <span><strong>${item.name}</strong> (${item.rate} kcal/분)</span>
          </label>
          <label>운동 시간 (분): <input type="number" min="1" value="${item.defaultDuration}" data-duration-index="${index}" /></label>
        `;
        container.appendChild(row);
      });
    }

    function getSelectedExercises() {
      const selected = [];
      exerciseChoices.forEach((item, index) => {
        const checkbox = document.querySelector(`input[type=checkbox][data-index="${index}"]`);
        const durationInput = document.querySelector(`input[type=number][data-duration-index="${index}"]`);
        if (checkbox && checkbox.checked) {
          const duration = Number(durationInput.value) || item.defaultDuration;
          selected.push({
            exerciseName: item.name,
            duration,
            caloriesBurned: duration * item.rate,
            date: today,
            intensity: '중간'
          });
        }
      });
      return selected;
    }

    async function saveSelectedExercises() {
      const items = getSelectedExercises();
      if (!items.length) {
        alert('하나 이상의 운동을 선택하세요.');
        return;
      }

      await Promise.all(items.map(item =>
        fetch('/api/exercise', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item)
        })
      ));

      await loadTodayExercises();
      await loadCalendar();
      alert('오늘 운동이 저장되었습니다.');
    }

    function renderTodaySummary(exercises) {
      const container = document.getElementById('todayExerciseSummary');
      if (!exercises.length) {
        container.innerHTML = '<p class="hint">오늘 저장된 운동이 없습니다.</p>';
        return;
      }

      const totalBurned = exercises.reduce((sum, item) => sum + item.caloriesBurned, 0);
      const list = exercises.map(item => `
        <div class="summary-item"><strong>${item.exerciseName}</strong> — ${item.duration}분, ${item.caloriesBurned} kcal</div>
      `).join('');

      container.innerHTML = `
        <div class="badge badge-total">총 소모 칼로리: ${totalBurned.toLocaleString()} kcal</div>
        <div class="summary-list">${list}</div>
      `;
    }

    async function loadTodayExercises() {
      const response = await fetch(`/api/exercise/date/${today}`);
      if (response.ok) {
        const exercises = await response.json();
        renderTodaySummary(exercises);
      }
    }

    function formatKcal(value) {
      return `${value.toLocaleString()} kcal`;
    }

    function formatDateLabel(date) {
      return date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric', weekday: 'short' });
    }

    async function loadCalendar() {
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      for (let offset = 6; offset >= 0; offset--) {
        const date = new Date();
        date.setDate(date.getDate() - offset);
        const isoDate = date.toISOString().slice(0, 10);

        const response = await fetch(`/daily-stats/${isoDate}`);
        const stats = response.ok ? await response.json() : { consumedCalories: 0, burnedCalories: 0 };

        const card = document.createElement('div');
        card.className = 'calendar-card';
        card.innerHTML = `
          <h3>${formatDateLabel(date)}</h3>
          <div><strong>섭취</strong></div>
          <div class="calendar-bar green" style="width:${Math.min(stats.consumedCalories / 30, 100)}%"></div>
          <div>${formatKcal(stats.consumedCalories)}</div>
          <div style="margin-top:10px"><strong>소모</strong></div>
          <div class="calendar-bar red" style="width:${Math.min(stats.burnedCalories / 20, 100)}%"></div>
          <div>${formatKcal(stats.burnedCalories)}</div>
        `;

        grid.appendChild(card);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderExerciseOptions();
      loadTodayExercises();
      loadCalendar();
      document.getElementById('saveExercises').addEventListener('click', saveSelectedExercises);
    });
  </script>
</body>
</html>
