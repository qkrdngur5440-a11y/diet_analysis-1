apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: diet-analysis-destination-rule
  namespace: default
spec:
  host: diet-analysis-service
  trafficPolicy:
    tls:
      # Enforce strict Mutual TLS (mTLS) inside the Istio Service Mesh
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 10
    outlierDetection:
      # Circuit Breaker policy to eject unhealthy analysis instances
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: diet-analysis-virtual-service
  namespace: default
spec:
  hosts:
  - diet-analysis-service
  http:
  - route:
    - destination:
        host: diet-analysis-service
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "5xx,connect-failure,refused-stream"
